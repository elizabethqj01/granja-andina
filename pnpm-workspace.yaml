packages:
  - functions

# Pin @types/node to a TS-compatible version across the workspace
# (a fresh install otherwise resolves @types/node 25.x, which breaks tsc -b).
overrides:
  '@types/node': 22.19.19

allowBuilds:
  esbuild: true
  protobufjs: true

onlyBuiltDependencies:
  - esbuild
  - protobufjs
